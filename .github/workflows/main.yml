name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  schema-tests:
    name: Schema Tests
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript, csharp

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5

      - name: Install NPM modules
        run: npm ci
        working-directory: ./tools
      
      - name: Lint
        run: npm run lint
        working-directory: ./tools

      - name: Run CI tests
        run: npm test
        working-directory: ./tools

      - name: Deployments Schema tests
        run: dotnet test DeploymentsSchemaTests/DeploymentsSchemaTests.csproj
        working-directory: ./tools

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  build-generator:
    name: Build Generator
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
      
      - name: Install
        run: npm ci
        working-directory: ./generator
      
      - name: Lint
        run: npm run lint
        working-directory: ./generator

      - name: Build
        run: npm run build
        working-directory: ./generator

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  dotnet-test:
    name: .NET Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # avoid shallow clone so nbgv can do its work.
          submodules: true

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5

      - name: Build
        run: |
          dotnet build

      - name: Run Tests
        run: |
          dotnet test